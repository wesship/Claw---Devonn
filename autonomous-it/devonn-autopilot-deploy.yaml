apiVersion: apps/v1
kind: Deployment
metadata:
  name: devonn-autopilot
  namespace: devonn-autopilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devonn-autopilot
  template:
    metadata:
      labels:
        app: devonn-autopilot
    spec:
      serviceAccountName: devonn-autopilot
      containers:
        - name: autopilot
          image: ghcr.io/your-org/devonn-autopilot:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: AUTOPILOT_MODE
              valueFrom:
                configMapKeyRef:
                  name: devonn-autopilot-config
                  key: AUTOPILOT_MODE
            - name: ALLOW_AUTONOMOUS_ACTIONS
              valueFrom:
                configMapKeyRef:
                  name: devonn-autopilot-config
                  key: ALLOW_AUTONOMOUS_ACTIONS
            - name: DEFAULT_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: devonn-autopilot-config
                  key: DEFAULT_NAMESPACE
            - name: SCALE_DELTA_DEFAULT
              valueFrom:
                configMapKeyRef:
                  name: devonn-autopilot-config
                  key: SCALE_DELTA_DEFAULT
            - name: TELEGRAM_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: devonn-autopilot-config
                  key: TELEGRAM_ENABLED
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: devonn-autopilot-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: devonn-autopilot-secret
                  key: TELEGRAM_CHAT_ID
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: devonn-autopilot
  namespace: devonn-autopilot
spec:
  selector:
    app: devonn-autopilot
  ports:
    - name: http
      port: 8000
      targetPort: 8000
