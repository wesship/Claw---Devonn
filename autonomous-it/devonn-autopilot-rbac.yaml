apiVersion: v1
kind: ServiceAccount
metadata:
  name: devonn-autopilot
  namespace: devonn-autopilot
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devonn-autopilot-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devonn-autopilot-rb
  namespace: default
subjects:
  - kind: ServiceAccount
    name: devonn-autopilot
    namespace: devonn-autopilot
roleRef:
  kind: Role
  name: devonn-autopilot-role
  apiGroup: rbac.authorization.k8s.io
